server {
    listen 80;
    server_name task-manager.local;

    root /app/public;
    index index.php index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    client_max_body_size 515M;

    location ~ (^|/)\. {
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* ^/(composer\.(json|lock)|README\.md|LICENSE(\.md)?|Makefile)$ {
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* \.(yml|yaml)$ {
        access_log off;
        log_not_found off;
        return 404;
    }

    location ^~ /config/ {
        access_log off;
        log_not_found off;
        return 404;
    }

    location ^~ /docker/ {
        access_log off;
        log_not_found off;
        return 404;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }
}
